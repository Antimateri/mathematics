baseURL = "https://antimateri.github.io/blog/"
publishdir = "public"
title = "Antimaterial Synergies"
copyright = "Copyright (c) 2008 - 2014, all rights reserved."
languageCode = "en-US"
canonifyurls = true
pagination.pagerSize = 8
theme = ["hugo-dusk"]
#themesDir = "../.."
enableRobotsTXT = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

#googleAnalytics = ""
disqusShortname = ""

SectionPagesMenu = "main"

[[menu.main]]
  name = "Blog"
  weight = -130
  identifier = "blog"
  url = "/"

[[menu.main]]
  name = "Tags"
  weight = -120
  identifier = "tag"
  url = "/tags/"

[[menu.main]]
  name = "Series"
  weight = -110
  identifier = "series"
  url = "/series/"

[[menu.main]]
  name = "Archive"
  weight = -100
  identifier = "archive"
  url = "/archive/"

[taxonomies]
  archive = "archive"
  blog = "blog"
  prerequisites = "prerequisites"
  category = "categories"
  series = "series"
  tag = "tags"
#  micro = "micro"

# Configure syntax highlight
[markup]
  [markup.highlight]
    style = "gruvbox"  # dark themes: monokai, api, fruity, native, rrt, swapoff ... https://xyproto.github.io/splash/docs/longer/all.html
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.math]
    enable = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 2

[params.author]
  name = "Antimateria"
  intro = """\
    Silly little guy doing silly little things (I will update thus later, hopefully).
  """

[params.meta]
  keywords = ""
  description = "Personal blog."
#[params.meta.fediverse]
#  creator = "@username@mastodon.server" # https://blog.joinmastodon.org/2024/07/highlighting-journalism-on-mastodon/

[params]
  mainSections = ['blog']
  email = "pablo.cageaoh@gmail.com"
  github = "Antimateri"
  #codeberg = "codeberg id"
  #gitlab = "gitlab id"
  #twitter = "twitter id"
  #linkedin = "linkedin id"
  theme_colors = "default-dark-purple"
  enable_separate_main_page = true # enable a separate main page with author intro and recent posts instead of the list of posts
  generate_opengraph_image = false # enable opengraph image auto generation

